<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Transit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --bg:        #1c1c1c;
    --surface:   #252525;
    --card:      #2e2e2e;
    --border:    #3a3a3a;
    --green:     #4caf50;
    --green-dim: #2e7d32;
    --green-bg:  rgba(76,175,80,0.10);
    --text:      #e0e0e0;
    --sub:       #888;
    --danger:    #f28b2f;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding-bottom: 48px;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--green-dim);
    padding: 14px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .logo { font-size: 1.15rem; font-weight: 700; color: var(--green); letter-spacing: 0.04em; }
  .logo-sub { font-size: 0.72rem; color: var(--sub); letter-spacing: 0.1em; }
  .header-right {
    margin-left: auto;
    font-size: 0.62rem;
    color: var(--sub);
    align-self: center;
    opacity: 0.8;
    text-align: right;
    line-height: 1.5;
  }

  /* Layout */
  main { max-width: 560px; margin: 0 auto; padding: 20px 14px; }

  /* Tabs */
  .tabs {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .tab {
    flex: 1;
    padding: 10px 0;
    background: var(--surface);
    color: var(--sub);
    font-size: 0.85rem;
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    transition: background 0.15s, color 0.15s;
  }
  .tab + .tab { border-left: 1px solid var(--border); }
  .tab.active { background: var(--green-dim); color: #fff; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px;
    margin-bottom: 14px;
  }

  .field-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--sub);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .station-input-wrap { position: relative; margin-bottom: 4px; }
  .station-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.97rem;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .station-input:focus { border-color: var(--green); }

  .dropdown {
    position: absolute;
    top: calc(100% + 3px);
    left: 0; right: 0;
    background: var(--card);
    border: 1px solid var(--green);
    border-radius: 5px;
    max-height: 210px;
    overflow-y: auto;
    z-index: 300;
    display: none;
    box-shadow: 0 6px 20px rgba(0,0,0,0.45);
  }
  .dropdown.open { display: block; }
  .dropdown-item {
    padding: 9px 14px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 7px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: var(--green-bg); }

  .swap-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
  .swap-line { flex: 1; height: 1px; background: var(--border); }
  .swap-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 34px; height: 34px;
    cursor: pointer;
    color: var(--sub);
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, color 0.15s, transform 0.2s;
    flex-shrink: 0;
  }
  .swap-btn:hover { border-color: var(--green); color: var(--green); transform: rotate(180deg); }

  .options-area {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .option-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.15s;
  }
  .option-row:hover { border-color: var(--green); }
  .option-row input[type="checkbox"] { display: none; }
  .option-toggle {
    width: 36px;
    height: 20px;
    background: var(--border);
    border-radius: 10px;
    position: relative;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .option-toggle::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: left 0.2s;
  }
  .option-row.checked .option-toggle { background: var(--green-dim); }
  .option-row.checked .option-toggle::after { left: 19px; }
  .option-label { flex: 1; font-size: 0.85rem; }
  .option-desc { font-size: 0.7rem; color: var(--sub); margin-top: 1px; }

  .opt-nether-icon {
    font-size: 0.75rem;
    background: rgba(155,0,255,0.18);
    color: #ce93d8;
    border: 1px solid rgba(155,0,255,0.3);
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .opt-heavy-icon {
    font-size: 0.75rem;
    background: rgba(242,139,47,0.15);
    color: var(--danger);
    border: 1px solid rgba(242,139,47,0.3);
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
  }

  .search-btn {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    background: var(--green-dim);
    color: #fff;
    border: none;
    border-radius: 5px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s;
  }
  .search-btn:hover { background: var(--green); }

  #result { display: none; }
  #result.visible { display: block; }

  .result-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
    flex-wrap: wrap;
  }
  .result-route-label { font-size: 0.8rem; font-weight: 700; color: var(--sub); }
  .result-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .transfer-badge {
    font-size: 0.78rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid var(--green-dim);
    white-space: nowrap;
  }
  .nether-used-badge {
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    background: rgba(155,0,255,0.15);
    color: #ce93d8;
    border: 1px solid rgba(155,0,255,0.3);
    white-space: nowrap;
  }

  .journey { display: flex; flex-direction: column; }
  .step { display: flex; gap: 12px; }
  .step-timeline {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 20px;
    flex-shrink: 0;
  }
  .step-dot {
    width: 13px; height: 13px;
    border-radius: 50%;
    border: 2.5px solid var(--sub);
    background: var(--bg);
    flex-shrink: 0;
    margin-top: 5px;
    z-index: 1;
  }
  .step-dot.start { border-color: var(--green); background: var(--green); }
  .step-dot.end   { border-color: #e0e0e0; background: #e0e0e0; }
  .step-dot.via   { border-color: #e0e0e0; background: var(--surface); }
  .step-connector { flex: 1; width: 2px; min-height: 8px; }
  .step-body { flex: 1; padding-bottom: 20px; }
  .step-station { font-size: 1rem; font-weight: 700; line-height: 1.3; margin-bottom: 2px; }
  .step-station-sub { font-size: 0.73rem; color: var(--sub); margin-bottom: 6px; }

  .heavy-marker {
    display: inline-block;
    font-size: 0.65rem;
    color: var(--danger);
    border: 1px solid rgba(242,139,47,0.4);
    background: rgba(242,139,47,0.1);
    padding: 0px 5px;
    border-radius: 3px;
    margin-left: 6px;
    vertical-align: middle;
    font-weight: 700;
  }

  .ride-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-left-width: 3px;
    border-radius: 0 5px 5px 0;
    padding: 8px 12px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .ride-name { font-size: 0.88rem; font-weight: 700; flex: 1; min-width: 60px; }
  .ride-stops { font-size: 0.75rem; color: var(--sub); white-space: nowrap; }

  .badge {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.04em;
    white-space: nowrap;
    flex-shrink: 0;
    border: 1px solid transparent;
  }
  .ato-badge.on  { background: rgba(76,175,80,0.18);  color: #66bb6a; border-color: rgba(76,175,80,0.35); }
  .ato-badge.off { background: rgba(242,139,47,0.15); color: var(--danger); border-color: rgba(242,139,47,0.3); }
  .type-badge.local   { background: rgba(105,105,105,0.25); color: #bdbdbd; border-color: #616161; }
  .type-badge.rapid   { background: rgba(100,177,255,0.2);  color: #90caf9; border-color: rgba(100,177,255,0.5); }
  .type-badge.express { background: rgba(255,221,99,0.18);  color: #ffe082; border-color: rgba(255,221,99,0.5); }
  .nether-badge {
    background: rgba(155,0,255,0.15);
    color: #ce93d8;
    border-color: rgba(155,0,255,0.35);
  }

  .no-route { text-align: center; padding: 28px 0; color: var(--sub); font-size: 0.9rem; line-height: 1.8; }

  .lines-list { display: flex; flex-direction: column; gap: 8px; }
  .lines-filter { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-btn {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--sub);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }
  .filter-btn.active { background: var(--green-dim); color: #fff; border-color: var(--green-dim); }

  .line-item {
    display: flex;
    align-items: stretch;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
  }
  .line-color-bar { width: 4px; flex-shrink: 0; }
  .line-body { flex: 1; padding: 10px 12px; min-width: 0; }
  .line-name {
    font-size: 0.92rem; font-weight: 700; margin-bottom: 4px;
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .line-stations-text { font-size: 0.73rem; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .line-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; padding: 0 12px; gap: 4px; flex-shrink: 0; }

  .section-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--sub);
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">MC Transit</div>
  <div class="logo-sub">乗り換え案内</div>
  <div class="header-right">Powered by KAP developer<br>version1.0.2</div>
</header>

<main>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('search')">経路検索</button>
    <button class="tab" onclick="switchTab('lines')">路線一覧</button>
  </div>

  <div id="tab-search" class="tab-pane active">
    <div class="card">
      <div class="field-label">出発駅</div>
      <div class="station-input-wrap">
        <input class="station-input" id="fromInput" type="text" placeholder="駅名を入力..."
               autocomplete="off" oninput="onInput('from')" onfocus="showDropdown('from')" />
        <div class="dropdown" id="fromDropdown"></div>
      </div>

      <div class="swap-row">
        <div class="swap-line"></div>
        <button class="swap-btn" onclick="swapStations()" title="入れ替え">⇅</button>
        <div class="swap-line"></div>
      </div>

      <div class="field-label">到着駅</div>
      <div class="station-input-wrap">
        <input class="station-input" id="toInput" type="text" placeholder="駅名を入力..."
               autocomplete="off" oninput="onInput('to')" onfocus="showDropdown('to')" />
        <div class="dropdown" id="toDropdown"></div>
      </div>

      <div class="options-area">
        <!-- onclickはJS側で一括制御するか、関数にeventを渡すように修正 -->
        <label class="option-row checked" id="optNether" onclick="toggleOption(event, 'optNether')">
          <input type="checkbox" checked />
          <div class="option-toggle"></div>
          <div>
            <div class="option-label">ネザー路線を使用する <span class="opt-nether-icon">ネザー</span></div>
            <div class="option-desc">ネザー内の路線を経路に含める</div>
          </div>
        </label>
        <label class="option-row" id="optAvoidHeavy" onclick="toggleOption(event, 'optAvoidHeavy')">
          <input type="checkbox" />
          <div class="option-toggle"></div>
          <div>
            <div class="option-label">重量駅を避ける <span class="opt-heavy-icon">重量</span></div>
            <div class="option-desc">FPS下降が懸念される駅を回避する</div>
          </div>
        </label>
      </div>

      <button class="search-btn" onclick="searchRoute()">経路を検索</button>
    </div>

    <div class="card" id="result">
      <div id="resultContent"></div>
    </div>
  </div>

  <div id="tab-lines" class="tab-pane">
    <div class="card">
      <div class="section-label">路線一覧</div>
      <div class="lines-filter">
        <button class="filter-btn active" onclick="setLineFilter('all')">すべて</button>
        <button class="filter-btn" onclick="setLineFilter('overworld')">オーバーワールド</button>
        <button class="filter-btn" onclick="setLineFilter('nether')">ネザー</button>
      </div>
      <div class="lines-list" id="linesList"></div>
    </div>
  </div>
</main>

];

/* ==============================================
   ヘルパー関数
   ============================================== */
const TYPE_CLASS = { "普通": "local", "快速": "rapid", "特急": "express" };

function typeBadge(type) {
  return '<span class="badge type-badge ' + (TYPE_CLASS[type] || "local") + '">' + type + '</span>';
}
function atoBadge(auto) {
  return auto
    ? '<span class="badge ato-badge on">ATO対応</span>'
    : '<span class="badge ato-badge off">ATO未対応</span>';
}
function netherBadge() {
  return '<span class="badge nether-badge">ネザー</span>';
}
function heavyMarker(name) {
  return HEAVY_STATIONS.has(name) ? '<span class="heavy-marker">重量</span>' : '';
}

/* ==============================================
   UI 操作（トグル修正含む）
   ============================================== */
function toggleOption(event, id) {
  const label = document.getElementById(id);
  const checkbox = label.querySelector('input[type="checkbox"]');
  
  // ラベルクリック時にinputの状態と同期させる
  // labelをクリックすると自動でcheckboxもクリックされるため、
  // checkboxの状態を基準にクラスを付け替える
  setTimeout(() => {
    if (checkbox.checked) {
      label.classList.add('checked');
    } else {
      label.classList.remove('checked');
    }
  }, 10);
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', ['search', 'lines'][i] === name));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

/* グラフ構築・検索ロジックなどはそのまま（正常動作確認済み） */
const ALL_STATIONS = [...new Set(ROUTES.flatMap(r => r.stations))].filter(s => s !== '').sort();
let fromStation = '', toStation = '';
let linesFilter = 'all';

function getFilteredRoutes() {
  const useNether = document.getElementById('optNether').classList.contains('checked');
  const avoidHeavy = document.getElementById('optAvoidHeavy').classList.contains('checked');
  
  return ROUTES.filter(r => {
    if (r.stations.some(s => s === '')) return false;
    if (!useNether && r.nether) return false;
    return true;
  }).map(r => {
    if (!avoidHeavy) return r;
    const filtered = r.stations.filter(s => !HEAVY_STATIONS.has(s));
    if (filtered.length < 2) return null;
    return Object.assign({}, r, { stations: filtered });
  }).filter(Boolean);
}

function buildGraph(routes) {
  const ALL = [...new Set(routes.flatMap(r => r.stations))];
  const graph = {};
  ALL.forEach(s => { graph[s] = []; });
  routes.forEach(route => {
    for (let i = 0; i < route.stations.length - 1; i++) {
      const a = route.stations[i], b = route.stations[i + 1];
      graph[a].push({ to: b, route });
      graph[b].push({ to: a, route });
    }
  });
  return graph;
}

function findRoute(graph, from, to) {
  if (from === to) return null;
  const queue = [{ station: from, currentRoute: null, transfers: 0, path: [] }];
  const visited = new Map();
  while (queue.length) {
    queue.sort((a, b) => a.transfers - b.transfers);
    const cur = queue.shift();
    const key = cur.station + '|' + (cur.currentRoute ? cur.currentRoute.id : '');
    if (visited.has(key) && visited.get(key) <= cur.transfers) continue;
    visited.set(key, cur.transfers);
    if (cur.station === to) return cur.path;
    if (!graph[cur.station]) continue;
    for (const edge of graph[cur.station]) {
      const isTransfer = cur.currentRoute && cur.currentRoute.id !== edge.route.id;
      queue.push({
        station: edge.to,
        currentRoute: edge.route,
        transfers: cur.transfers + (isTransfer ? 1 : 0),
        path: [...cur.path, { from: cur.station, to: edge.to, route: edge.route }]
      });
    }
  }
  return null;
}

function pathToSegments(path) {
  if (!path || !path.length) return [];
  const segs = [];
  let seg = { route: path[0].route, stations: [path[0].from, path[0].to] };
  for (let i = 1; i < path.length; i++) {
    if (path[i].route.id === seg.route.id) {
      seg.stations.push(path[i].to);
    } else {
      segs.push(seg);
      seg = { route: path[i].route, stations: [path[i].from, path[i].to] };
    }
  }
  segs.push(seg);
  return segs;
}

function onInput(which) { showDropdown(which); }

function showDropdown(which) {
  closeAllDropdowns();
  const useNether = document.getElementById('optNether').classList.contains('checked');
  const input    = document.getElementById(which + 'Input');
  const dropdown = document.getElementById(which + 'Dropdown');
  const q = input.value.trim();

  const availableStations = useNether
    ? ALL_STATIONS
    : ALL_STATIONS.filter(s => ROUTES.some(r => !r.nether && r.stations.includes(s)));

  const filtered = q ? availableStations.filter(s => s.includes(q)) : availableStations;
  dropdown.innerHTML = filtered.map(s => {
    const dots = ROUTES.filter(r => r.stations.includes(s)).slice(0, 4)
      .map(r => '<span style="width:8px;height:8px;border-radius:50%;background:' + r.color + ';display:inline-block;flex-shrink:0"></span>')
      .join('');
    const safe = s.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    return '<div class="dropdown-item" onclick="selectStation(\'' + which + '\',\'' + safe + '\')">' + dots + '<span>' + s + '</span></div>';
  }).join('');
  if (filtered.length) dropdown.classList.add('open');
}

function selectStation(which, name) {
  if (which === 'from') { fromStation = name; document.getElementById('fromInput').value = name; }
  else                  { toStation   = name; document.getElementById('toInput').value   = name; }
  closeAllDropdowns();
}

function closeAllDropdowns() {
  document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
}

document.addEventListener('click', e => {
  if (!e.target.closest('.station-input-wrap')) closeAllDropdowns();
});

function swapStations() {
  const fromVal = document.getElementById('fromInput').value;
  const toVal = document.getElementById('toInput').value;
  document.getElementById('fromInput').value = toVal;
  document.getElementById('toInput').value = fromVal;
}

function searchRoute() {
  const from = document.getElementById('fromInput').value.trim();
  const to = document.getElementById('toInput').value.trim();
  const resultDiv = document.getElementById('result');
  const content   = document.getElementById('resultContent');
  resultDiv.classList.add('visible');

  if (!from || !to) {
    content.innerHTML = '<div class="no-route">出発駅と到着駅を入力してください</div>'; return;
  }
  if (!ALL_STATIONS.includes(from) || !ALL_STATIONS.includes(to)) {
    content.innerHTML = '<div class="no-route">駅名が正しくありません</div>'; return;
  }
  if (from === to) {
    content.innerHTML = '<div class="no-route">出発駅と到着駅が同じです</div>'; return;
  }

  const filteredRoutes = getFilteredRoutes();
  const graph = buildGraph(filteredRoutes);

  if (!graph[from] || !graph[to]) {
    content.innerHTML = '<div class="no-route">現在の設定では経路が見つかりません。<br>ネザー路線の使用を確認してください。</div>'; return;
  }

  const path = findRoute(graph, from, to);
  if (!path) {
    content.innerHTML = '<div class="no-route">経路が見つかりませんでした。</div>'; return;
  }

  const segs = pathToSegments(path);
  const transfers = segs.length - 1;
  const usesNether = segs.some(s => s.route.nether);

  let html = '<div class="result-meta">'
    + '<div class="result-route-label">' + from + ' - ' + to + '</div>'
    + '<div class="result-badges">'
    + '<span class="transfer-badge">乗り換え ' + transfers + ' 回</span>'
    + (usesNether ? '<span class="nether-used-badge">ネザー経由</span>' : '')
    + '</div></div><div class="journey">';

  segs.forEach(function(seg, idx) {
    var isFirst = idx === 0;
    var isLast  = idx === segs.length - 1;
    var stops   = seg.stations.length - 1;
    var nextSeg = segs[idx + 1];

    if (isFirst) {
      html += '<div class="step">'
        + '<div class="step-timeline">'
        +   '<div class="step-dot start"></div>'
        +   '<div class="step-connector" style="background:' + seg.route.color + '55"></div>'
        + '</div>'
        + '<div class="step-body">'
        +   '<div class="step-station">' + seg.stations[0] + heavyMarker(seg.stations[0]) + '</div>'
        +   '<div class="step-station-sub">出発</div>'
        +   '<div class="ride-block" style="border-left-color:' + seg.route.color + '">'
        +     '<div class="ride-name" style="color:' + seg.route.color + '">' + seg.route.name + '</div>'
        +     typeBadge(seg.route.type)
        +     (seg.route.nether ? netherBadge() : '')
        +     '<div class="ride-stops">' + stops + '駅</div>'
        +     atoBadge(seg.route.auto)
        +   '</div>'
        + '</div></div>';
    }

    var arrStation = seg.stations[seg.stations.length - 1];
    var dotClass   = isLast ? 'end' : 'via';

    html += '<div class="step">'
      + '<div class="step-timeline">'
      +   '<div class="step-dot ' + dotClass + '"></div>'
      +   (!isLast ? '<div class="step-connector" style="background:' + nextSeg.route.color + '55"></div>' : '')
      + '</div>'
      + '<div class="step-body">'
      +   '<div class="step-station">' + arrStation + heavyMarker(arrStation) + '</div>'
      +   '<div class="step-station-sub">' + (isLast ? '到着' : '乗り換え') + '</div>';

    if (!isLast) {
      html += '<div class="ride-block" style="border-left-color:' + nextSeg.route.color + '">'
        +   '<div class="ride-name" style="color:' + nextSeg.route.color + '">' + nextSeg.route.name + '</div>'
        +   typeBadge(nextSeg.route.type)
        +   (nextSeg.route.nether ? netherBadge() : '')
        +   '<div class="ride-stops">' + (nextSeg.stations.length - 1) + '駅</div>'
        +   atoBadge(nextSeg.route.auto)
        + '</div>';
    }
    html += '</div></div>';
  });

  html += '</div>';
  content.innerHTML = html;
  resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function setLineFilter(f) {
  linesFilter = f;
  document.querySelectorAll('.filter-btn').forEach((b, i) =>
    b.classList.toggle('active', ['all', 'overworld', 'nether'][i] === f));
  renderLines();
}

function renderLines() {
  const list = ROUTES.filter(r => {
    if (r.stations.some(s => s === '')) return false;
    if (linesFilter === 'overworld') return !r.nether;
    if (linesFilter === 'nether')    return r.nether;
    return true;
  });
  document.getElementById('linesList').innerHTML = list.map(r =>
    '<div class="line-item">'
    + '<div class="line-color-bar" style="background:' + r.color + '"></div>'
    + '<div class="line-body">'
    +   '<div class="line-name" style="color:' + r.color + '">' + r.name + ' ' + typeBadge(r.type) + '</div>'
    +   '<div class="line-stations-text">' + r.stations.join(' > ') + '</div>'
    + '</div>'
    + '<div class="line-right">'
    +   (r.nether ? netherBadge() : '')
    +   atoBadge(r.auto)
    + '</div>'
    + '</div>'
  ).join('');
}

renderLines();
</script>
